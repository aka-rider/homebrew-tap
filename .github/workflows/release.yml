name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Install build tools
        run: brew install cmake ninja libomp

      - name: Fetch whisper.cpp source
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          curl -fsSL "https://github.com/ggml-org/whisper.cpp/archive/refs/tags/${VERSION}.tar.gz" \
            | tar xz --strip-components=1

      - name: Build whisper-server
        env:
          OpenMP_ROOT: /opt/homebrew/opt/libomp
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_ACCELERATE=ON \
            -DGGML_BLAS=ON \
            -DGGML_BLAS_VENDOR=Apple \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=ON \
            -DGGML_METAL=ON \
            -DWHISPER_COREML=ON \
            -DWHISPER_SDL2=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build build --config Release

      - name: Fix libomp rpath and sign
        run: |
          install_name_tool -change \
            @rpath/libomp.dylib \
            /opt/homebrew/opt/libomp/lib/libomp.dylib \
            build/bin/whisper-server
          codesign --sign - --force build/bin/whisper-server

      - name: Package
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mkdir release
          cp build/bin/whisper-server release/
          tar czf "release/whisper-server-${VERSION}-arm64.tar.gz" -C release whisper-server
          echo "=== UPDATE Formula/whisper-cpp-server.rb sha256 to: ==="
          shasum -a 256 "release/whisper-server-${VERSION}-arm64.tar.gz"

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/whisper-server-*-arm64.tar.gz
